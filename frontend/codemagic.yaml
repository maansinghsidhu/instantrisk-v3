# InstantRisk V2 - Codemagic CI/CD Configuration
# Builds iOS and Android in the cloud (no Mac required!)
# Sign up free at: https://codemagic.io

workflows:
  # ============================================
  # iOS Build & Deploy
  # ============================================
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.alexandratechlab.instantrisk
      vars:
        APP_STORE_CONNECT_ISSUER_ID: Encrypted(...) # Add in Codemagic UI
        APP_STORE_CONNECT_KEY_IDENTIFIER: Encrypted(...)
        APP_STORE_CONNECT_PRIVATE_KEY: Encrypted(...)
        CERTIFICATE_PRIVATE_KEY: Encrypted(...)
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files $(xcode-project detect-bundle-id)
          keychain add-certificates
          xcode-project use-profiles

      - name: Get Flutter packages
        script: flutter packages pub get

      - name: Build iOS
        script: |
          flutter build ipa --release \
            --build-name=2.0.0 \
            --build-number=$(($(app-store-connect get-latest-testflight-build-number "$APP_STORE_ID") + 1)) \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false

  # ============================================
  # Android Build & Deploy
  # ============================================
  android-workflow:
    name: Android Build
    max_build_duration: 30
    instance_type: linux_x2

    environment:
      android_signing:
        - instantrisk_keystore # Add keystore in Codemagic UI
      vars:
        PACKAGE_NAME: "com.alexandratechlab.instantrisk"
        GOOGLE_PLAY_CREDENTIALS: Encrypted(...) # Add in Codemagic UI
      flutter: stable

    scripts:
      - name: Get Flutter packages
        script: flutter packages pub get

      - name: Build AAB
        script: |
          flutter build appbundle --release \
            --build-name=2.0.0 \
            --build-number=$BUILD_NUMBER

    artifacts:
      - build/app/outputs/bundle/release/*.aab
      - build/app/outputs/flutter-apk/*.apk

    publishing:
      google_play:
        credentials: $GOOGLE_PLAY_CREDENTIALS
        track: internal # internal, alpha, beta, production
        submit_as_draft: true

  # ============================================
  # Build Both Platforms
  # ============================================
  release-workflow:
    name: Release (iOS + Android)
    max_build_duration: 90
    instance_type: mac_mini_m1

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.alexandratechlab.instantrisk
      android_signing:
        - instantrisk_keystore
      vars:
        # iOS
        APP_STORE_CONNECT_ISSUER_ID: Encrypted(...)
        APP_STORE_CONNECT_KEY_IDENTIFIER: Encrypted(...)
        APP_STORE_CONNECT_PRIVATE_KEY: Encrypted(...)
        CERTIFICATE_PRIVATE_KEY: Encrypted(...)
        # Android
        PACKAGE_NAME: "com.alexandratechlab.instantrisk"
        GOOGLE_PLAY_CREDENTIALS: Encrypted(...)
      flutter: stable
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*'
          include: true

    scripts:
      # iOS Setup
      - name: Set up iOS signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files $(xcode-project detect-bundle-id)
          keychain add-certificates
          xcode-project use-profiles

      - name: Get packages
        script: flutter packages pub get

      # Build both
      - name: Build iOS
        script: flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist

      - name: Build Android
        script: flutter build appbundle --release

    artifacts:
      - build/ios/ipa/*.ipa
      - build/app/outputs/bundle/release/*.aab

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
      google_play:
        credentials: $GOOGLE_PLAY_CREDENTIALS
        track: internal
